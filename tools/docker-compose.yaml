services:
  navegacion_deteccion_senales:
    image: ghcr.io/autowarefoundation/autoware:universe-cuda-jazzy
    privileged: true
    runtime: nvidia
    network_mode: host
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_DRIVER_CAPABILITIES=all
      - NVIDIA_VISIBLE_DEVICES=all
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/autoware_data/maps:/home/aw/autoware_data/maps
      - ${HOME}/autoware_data/ml_models:/home/aw/autoware_data/ml_models
      - ${PWD}/..:/home/aw/workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - bash
      - -c
      - |
        cd /home/aw/workspace
        source /opt/autoware/setup.bash
        source install/setup.bash
        ros2 launch navegacion_deteccion_senales run.launch.py
        exec bash