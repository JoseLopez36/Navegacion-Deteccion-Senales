vehicle_control_node:
  ros__parameters:
    control_rate: 10.0          # Hz - menor frecuencia para respuesta más suave
    max_steer: 1.0              # normalizado CARLA [-1, 1]
    max_steer_rad: 0.6          # ángulo físico máximo del volante [rad] (~34°)
    kp_throttle: 0.3            # P sobre error de velocidad
    ki_throttle: 0.05           # I sobre error de velocidad

    # Parámetros de control
    target_speed: 2.78         # m/s
    kp_steering: 0.20          # [rad/m]
    ki_steering: 0.02          # [rad/(m·s)]
    kd_steering: 0.10          # [rad·s/m]

    lane_error_topic: /lane_detection/lane_error
    speedometer_topic: /carla/ego_vehicle/speedometer
    vehicle_control_topic: /carla/ego_vehicle/vehicle_control_cmd
    speed_limit_topic: /sign_detection/speed_limit

lane_detection_node:
  ros__parameters:
    image_topic: /carla/ego_vehicle/rgb_front/image
    camera_info_topic: /carla/ego_vehicle/rgb_front/camera_info
    lane_error_topic: /lane_detection/lane_error
    lane_state_topic: /lane_detection/lane_state
    model_path: /home/ros/workspace/src/navegacion_deteccion_senales/models/lane_model.onnx

sign_detection_node:
  ros__parameters:
    image_topic: /carla/ego_vehicle/rgb_front/image
    rgb_camera_info_topic: /carla/ego_vehicle/rgb_front/camera_info
    semantic_topic: /carla/ego_vehicle/semantic_segmentation_front/image
    semantic_camera_info_topic: /carla/ego_vehicle/semantic_segmentation_front/camera_info
    sign_label_topic: /sign_detection/sign_label
    speed_limit_topic: /sign_detection/speed_limit
    sign_bbox_topic: /sign_detection/bbox
    sign_mask_topic: /sign_detection/mask
    model_path: /home/ros/workspace/src/navegacion_deteccion_senales/models/sign_model.pth
    min_sign_area: 150
    max_sign_area: 50000
    bbox_padding: 20
    min_votes: 5

annotation_generator_node:
  ros__parameters:
    image_topic: /carla/ego_vehicle/rgb_front/image
    lane_error_topic: /lane_detection/lane_error
    lane_state_topic: /lane_detection/lane_state
    sign_label_topic: /sign_detection/sign_label
    speed_limit_topic: /sign_detection/speed_limit
    sign_bbox_topic: /sign_detection/bbox
    annotations_topic: /foxglove/annotations
    image_width: 800
    image_height: 600

sign_dataset_node:
  ros__parameters:
    image_topic: /carla/ego_vehicle/rgb_front/image
    semantic_topic: /carla/ego_vehicle/semantic_segmentation_front/image
    rgb_camera_info_topic: /carla/ego_vehicle/rgb_front/camera_info
    semantic_camera_info_topic: /carla/ego_vehicle/semantic_segmentation_front/camera_info
    output_dir: /home/ros/workspace/src/navegacion_deteccion_senales/dataset
    capture_rate: 5.0
    min_sign_area: 200
    max_sign_area: 50000
    crop_margin: 10

lane_dataset_node:
  ros__parameters:
    image_topic: /carla/ego_vehicle/rgb_front/image
    semantic_topic: /carla/ego_vehicle/semantic_segmentation_front/image
    rgb_camera_info_topic: /carla/ego_vehicle/rgb_front/camera_info
    semantic_camera_info_topic: /carla/ego_vehicle/semantic_segmentation_front/camera_info
    output_dir: /home/ros/workspace/src/navegacion_deteccion_senales/lane_dataset
    capture_rate: 5.0
    min_lane_area: 100