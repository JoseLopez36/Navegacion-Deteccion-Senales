vehicle_control_node:
  ros__parameters:
    control_rate: 20.0          # Hz
    target_speed: 5.0           # m/s (~18 km/h)
    max_steering_angle: 0.5     # rad
    kp_steering: 0.005          # P sobre error lateral en píxeles
    kd_steering: 0.001          # D sobre derivada del error lateral
    kp_throttle: 0.3            # P sobre error de velocidad
    ki_throttle: 0.05           # I sobre error de velocidad
    max_integral: 1.0           # anti-windup del integrador
    lane_loss_timeout: 1.0      # s sin carril detectado → frena
    lane_error_topic: /lane_detection/lane_error
    lane_state_topic: /lane_detection/lane_state
    speed_limit_topic: /sign_detection/speed_limit
    speedometer_topic: /carla/ego_vehicle/speedometer
    vehicle_control_topic: /carla/ego_vehicle/vehicle_control_cmd

lane_detection_node:
  ros__parameters:
    image_topic: /carla/ego_vehicle/rgb_front/image
    lane_error_topic: /lane_detection/lane_error
    lane_state_topic: /lane_detection/lane_state
    model_path: /home/ros/workspace/src/navegacion_deteccion_senales/models/lane_model.keras

sign_detection_node:
  ros__parameters:
    image_topic: /carla/ego_vehicle/rgb_front/image
    sign_label_topic: /sign_detection/sign_label
    speed_limit_topic: /sign_detection/speed_limit
    model_path: ''

annotation_generator_node:
  ros__parameters:
    image_topic: /carla/ego_vehicle/rgb_front/image
    lane_error_topic: /lane_detection/lane_error
    sign_label_topic: /sign_detection/sign_label
    speed_limit_topic: /sign_detection/speed_limit
    annotations_topic: /foxglove/annotations
    image_width: 800
    image_height: 600

sign_dataset_node:
  ros__parameters:
    image_topic: /carla/ego_vehicle/rgb_front/image
    semantic_topic: /carla/ego_vehicle/semantic_segmentation_front/image
    rgb_camera_info_topic: /carla/ego_vehicle/rgb_front/camera_info
    semantic_camera_info_topic: /carla/ego_vehicle/semantic_segmentation_front/camera_info
    output_dir: /home/ros/workspace/src/navegacion_deteccion_senales/dataset
    capture_rate: 5.0
    min_sign_area: 200
    max_sign_area: 50000
    crop_margin: 10

lane_dataset_node:
  ros__parameters:
    image_topic: /carla/ego_vehicle/rgb_front/image
    semantic_topic: /carla/ego_vehicle/semantic_segmentation_front/image
    rgb_camera_info_topic: /carla/ego_vehicle/rgb_front/camera_info
    semantic_camera_info_topic: /carla/ego_vehicle/semantic_segmentation_front/camera_info
    output_dir: /home/ros/workspace/src/navegacion_deteccion_senales/lane_dataset
    capture_rate: 5.0
    min_lane_area: 100